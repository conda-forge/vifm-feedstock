{% set name = "vifm" %}
{% set version = "0.14.1" %}
{% set sha256 = "01f19e114e29f481d20faa6b35a42b883a3f487324ddb2f7107ce1c102c4a496" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: http://jaist.dl.sourceforge.net/project/vifm/vifm/{{ name }}-{{ version }}.tar.bz2
  sha256: {{ sha256 }}

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - ncurses

  run:
    - ncurses

test:
  commands:
    - vifm --help

about:
  home: https://vifm.info/
  license: GPL-2.0
  license_file: COPYING
  summary: 'Vifm is an ncurses based file manager with vi like keybindings'

extra:
  recipe-maintainers:
    - Rex-Diego
